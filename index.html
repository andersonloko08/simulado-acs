<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado ACS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    📘 Plataforma de Simulado ACS
</header>

<main class="app">

    <!-- TELA INICIAL -->
    <section id="home" class="screen active">

        <div class="card-center">

            <h1>Bem-vinda</h1>
            <p>Gere um simulado aleatório com 40 questões</p>

            <button onclick="startQuiz()">
                ▶ Gerar Simulado
            </button>

            <div id="stats"></div>

        </div>

    </section>

    <!-- QUIZ -->
    <section id="quiz" class="screen"></section>

    <!-- RESULTADO -->
    <section id="result"></section>

</main>

<script src="app.js"></script>

</body>
</html>
