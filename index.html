<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma de Estudo ACS</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    📘 Plataforma de Estudo ACS
</header>

<main class="container">

    <!-- TELA INICIAL -->
    <section id="dashboard">

        <div class="start-box">
            <h2>Bem-vinda ao Simulado</h2>
            <p>Clique para gerar um novo simulado aleatório</p>

            <button onclick="iniciarSimulado()">
                ▶ Gerar Simulado
            </button>
        </div>

        <div id="stats"></div>

    </section>

    <!-- SIMULADO -->
    <section id="simulado" style="display:none;"></section>

    <!-- RESULTADO -->
    <section id="resultado"></section>

</main>

<script src="app.js"></script>

</body>
</html>
